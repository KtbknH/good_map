name: goodmaps_app
description: "Good Maps — suggestions d'activités adaptées (PMR) générées par IA."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2            # Gestion d'état (séparation UI / logique)
  http: ^1.2.2               # Appel du backend / LLM (POC : JSON bien formaté)
  flutter_map: ^6.0.0        # Carte OpenStreetMap (aucune clé API requise)
  latlong2: ^0.9.0           # Coordonnées géographiques (LatLng)
  url_launcher: ^6.3.0       # Ouvrir une URL (réservation) et appeler (tel:)
  geolocator: ^13.0.0        # Géolocalisation de l'appareil
  shared_preferences: ^2.3.0 # Persistance locale du profil

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
